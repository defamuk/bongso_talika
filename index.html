*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1A0000;--bg2:#210505;--bg3:#2a0a0a;--bg4:#331010;--bgi:#280808;--bd:#3d1515;--bdh:#4d2020;--ac:#d4956a;--acb:#e8ac82;--acm:#9a6e48;--acs:rgba(212,149,106,0.08);--tx:#f0e4d6;--ts:#c4b0a0;--tm:#8a7568;--tf:#5c4a40;--ml:#6a9ac0;--fm:#c06a8a;--rd:#c06060;--gn:#60b070;--sl:#d4956a;--cl:#5c4a40}
body{font-family:'Source Sans 3',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
input,select,textarea,button{font-family:inherit}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fu{animation:fu .25s ease forwards}
.hd{padding:14px 20px;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,var(--bg2),var(--bg));display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.hd-t{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ac)}
.hd-s{font-size:10px;color:var(--tf);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.nv{display:flex;gap:2px;padding:6px 20px;border-bottom:1px solid var(--bd);background:var(--bg2);overflow-x:auto}
.nb{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-size:13px;white-space:nowrap;background:transparent;color:var(--tm);transition:all .15s}
.nb:hover{background:var(--acs);color:var(--acb)}.nb.on{background:rgba(212,149,106,.12);color:var(--acb);font-weight:600}
.mn{padding:16px 20px;max-width:1400px;margin:0 auto}
.cd{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:10px;transition:border-color .15s}
.cd:hover{border-color:var(--bdh)}.cda{border-color:rgba(212,149,106,.2)}
.ip{width:100%;padding:9px 12px;border-radius:6px;background:var(--bgi);border:1px solid var(--bd);color:var(--tx);font-size:14px;outline:none}.ip:focus{border-color:var(--acm)}
.lb{display:block;font-size:10px;color:var(--tf);margin-bottom:3px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.bt{padding:9px 18px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.bp{background:var(--ac);color:var(--bg);border:none;font-weight:600}.bp:hover{filter:brightness(1.1)}
.bg{background:transparent;color:var(--ts);border:1px solid var(--bd)}.bg:hover{background:var(--acs);color:var(--acb)}
.bd{background:transparent;color:var(--rd);border:1px solid rgba(192,96,96,.25)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bgi);flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.am{border:2px solid var(--ml)}.af{border:2px solid var(--fm)}.ao{border:2px solid var(--acm)}
.cc{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--bgi);color:var(--tx);font-size:12px;cursor:pointer;transition:all .12s}
.cc:hover{border-color:var(--ac);background:var(--acs)}
.ct{padding:3px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tm);transition:all .12s}
.ct.on{border-color:var(--ac);background:rgba(212,149,106,.12);color:var(--acb)}
.sl{font-size:10px;color:var(--acm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.dn{padding:14px;border-radius:6px;background:rgba(212,149,106,.04);border-left:3px solid rgba(212,149,106,.3);margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}@media(max-width:500px){.g2{grid-template-columns:1fr}}
.sb{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:20px;padding:14px;border-radius:8px;background:linear-gradient(135deg,var(--bg3),rgba(212,149,106,.04));border:1px solid var(--bd)}
.sn{font-size:22px;font-weight:700;color:var(--ac);font-family:'Playfair Display',serif}
.sla{font-size:9px;color:var(--tm);letter-spacing:1.5px;text-transform:uppercase}
.ft{padding:14px 20px;border-top:1px solid var(--bd);text-align:center;font-size:10px;color:var(--tf);letter-spacing:1px}

/* Tree */
.tc{overflow-x:auto;overflow-y:auto;padding:20px 0;-webkit-overflow-scrolling:touch}
.gs{margin-bottom:20px}
.glr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:0 10px}
.glt{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--acm);font-weight:700;white-space:nowrap}
.gl{flex:1;height:1px;background:var(--bd)}.gc{font-size:10px;color:var(--tf)}

.fu2{display:flex;flex-direction:column;align-items:center;gap:4px}
.cr{display:flex;align-items:center;gap:0}
.sc{width:24px;height:2px;background:var(--sl);position:relative;display:flex;align-items:center;justify-content:center}
.sc::after{content:'∞';position:absolute;top:-10px;font-size:11px;color:var(--sl);line-height:1}
.cb{display:flex;flex-direction:column;align-items:center}
.cbs{width:2px;height:12px;background:var(--cl)}
.cbr{height:2px;background:var(--cl)}
.chr{display:flex;gap:2px;justify-content:center}
.chs{width:2px;height:10px;background:var(--cl);margin:0 auto}

.tn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:7px;cursor:pointer;background:var(--bg3);border:1px solid var(--bd);min-width:72px;max-width:92px;transition:all .2s ease;position:relative}
.tn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5);border-color:var(--ac)}
.tn.dg{opacity:.4}.tn.dov{border-color:var(--acb);box-shadow:0 0 12px rgba(212,149,106,.3)}
.na{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bgi);font-size:12px;color:var(--tm)}

.nn{font-size:10px;font-weight:600;text-align:center;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx)}
.ns{font-size:8px;color:var(--tf);text-align:center}.ny{font-size:8px;color:var(--tf)}

.mt{padding:16px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);margin-bottom:16px;overflow-x:auto}
.mg{margin-bottom:12px}.mgl{font-size:9px;color:var(--tf);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.mgr{display:flex;flex-wrap:wrap;gap:6px}
.mnd{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;font-size:11px;cursor:pointer;background:var(--bg3);border:1px solid var(--bd);transition:all .12s}
.mnd:hover{border-color:var(--ac)}.mnd.cur{border-color:var(--ac);background:rgba(212,149,106,.1);font-weight:600}
.mdt{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sg code{background:var(--bgi);padding:1px 6px;border-radius:3px;font-family:monospace;font-size:11px}
.hl{color:var(--acb)}

async function fDl(id){if(!fdb||S.ss!=="synced")return;const f=window._fb;try{await f.remove(f.ref(fdb,`familyTree/${id}`))}catch{}}
async function fPA(){if(!fdb)return;const f=window._fb;for(const p of S.people){const{id,...d}=p;await f.set(f.ref(fdb,`familyTree/${id}`),d)}alert(`Pushed ${S.people.length}!`)}

function sP(person){

  (person.parentIds||[]).forEach(pid=>sr(pid,"childIds",person.id));
  (person.childIds||[]).forEach(cid=>sr(cid,"parentIds",person.id));
  (person.spouseIds||[]).forEach(sid=>sr(sid,"spouseIds",person.id));
  const i=S.people.findIndex(p=>p.id===person.id);
  if(i>=0)S.people[i]=person;else S.people.push(person);
  sL();fSv(person);
  [...(person.parentIds||[]),...(person.childIds||[]),...(person.spouseIds||[])].forEach(r=>{const rp=fp(r);if(rp)fSv(rp)});
  S.editing=null;if(S.view==="add")S.view="people";R()
}
function dP(id){
  S.people=S.people.filter(p=>p.id!==id).map(p=>({...p,parentIds:(p.parentIds||[]).filter(x=>x!==id),childIds:(p.childIds||[]).filter(x=>x!==id),spouseIds:(p.spouseIds||[]).filter(x=>x!==id)}));

}

// ─── Tree View ────────────────────────────────────────────────
function rTV(){
const gs={1:[],2:[],3:[],4:[],5:[],6:[],7:[],8:[]};
S.people.forEach(p=>{const n=Number(p.generation);if(n>=1&&n<=8)gs[n].push(p)});
Object.values(gs).forEach(a=>a.sort((x,y)=>(x.so||0)-(y.so||0)));
const st={t:S.people.length,p:S.people.filter(p=>p.photo).length,n:S.people.filter(p=>p.lifeDetails).length,g:new Set(S.people.map(p=>p.generation).filter(Boolean)).size};

let h="";
if(S.people.length>0)h+=`<div class="sb">${[{n:st.t,l:"People"},{n:st.g,l:"Generations"},{n:st.p,l:"Photos"},{n:st.n,l:"Notes"}].map(s=>`<div style="text-align:center"><div class="sn">${s.n}</div><div class="sla">${s.l}</div></div>`).join("")}</div>`;

h+=`<div class="tc"><div>`;
for(let g=1;g<=8;g++){
if(gs[g].length===0)continue;
const placed=new Set(),units=[];
gs[g].forEach(p=>{
  if(placed.has(p.id))return;placed.add(p.id);
  const sp=(p.spouseIds||[]).map(fp).filter(s=>s&&Number(s.generation)===g&&!placed.has(s.id));
  sp.forEach(s=>placed.add(s.id));
  const ch=[...new Set([...(p.childIds||[]),...sp.flatMap(s=>s.childIds||[])])].map(fp).filter(Boolean);
  const nch=ch.filter(c=>Number(c.generation)===g+1);
  units.push({p,sp,ch:nch})
});

h+=`<div class="gs"><div class="glr"><span class="glt">Gen ${g}</span><div class="gl"></div><span class="gc">${gs[g].length}</span></div>
<div class="fur">`;

units.forEach(u=>{
  h+=`<div class="fu2">`;
  // Couple
  h+=`<div class="cr">${nH(u.p)}`;
  u.sp.forEach(s=>{h+=`<div class="sc"></div>${nH(s)}`});
  h+=`</div>`;
  // Children indicator
  if(u.ch.length>0){
    h+=`<div class="cb"><div class="cbs"></div>
      <div style="display:flex;gap:2px;align-items:flex-start">`;
    u.ch.forEach((c,i)=>{
      h+=`<div style="display:flex;flex-direction:column;align-items:center">
        <div class="chs"></div>${nH(c,true)}
      </div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;
});
h+=`</div></div>`;
}
h+=`</div></div>`;
if(S.people.length===0)h+=`<div style="text-align:center;padding:50px;color:var(--tm)"><div style="font-size:18px;font-family:'Playfair Display',serif;margin-bottom:6px;color:var(--ts)">Empty tree</div><div style="font-size:13px">Add your first family member</div></div>`;
return h}

// ─── Mini Tree ────────────────────────────────────────────────
function rMT(person){
const col=new Map();col.set(person.id,person);
function addUp(p,d){if(d<=0)return;(p.parentIds||[]).forEach(pid=>{const pp=fp(pid);if(pp&&!col.has(pp.id)){col.set(pp.id,pp);addUp(pp,d-1)}});(p.parentIds||[]).forEach(pid=>{const pp=fp(pid);if(pp)(pp.spouseIds||[]).forEach(sid=>{const s=fp(sid);if(s&&!col.has(s.id))col.set(s.id,s)})})}
addUp(person,2);
const sibs=S.people.filter(x=>x.id!==person.id&&(person.parentIds||[]).length>0&&(x.parentIds||[]).some(pid=>(person.parentIds||[]).includes(pid)));
sibs.forEach(s=>col.set(s.id,s));
(person.spouseIds||[]).forEach(sid=>{const s=fp(sid);if(s)col.set(s.id,s)});
function addDn(p,d){if(d<=0)return;(p.childIds||[]).forEach(cid=>{const c=fp(cid);if(c&&!col.has(c.id)){col.set(c.id,c);addDn(c,d-1)}});(p.childIds||[]).forEach(cid=>{const c=fp(cid);if(c)(c.spouseIds||[]).forEach(sid=>{const s=fp(sid);if(s&&!col.has(s.id))col.set(s.id,s)})})}
addDn(person,2);
const gg={};col.forEach(p=>{const g=Number(p.generation)||0;if(!gg[g])gg[g]=[];gg[g].push(p)});
const sk=Object.keys(gg).map(Number).sort((a,b)=>a-b);
if(!sk.length)return"";
let h=`<div class="mt"><div class="sl">Family Context (2 generations above & below)</div>`;
sk.forEach(g=>{
  h+=`<div class="mg"><div class="mgl">Gen ${g}</div><div class="mgr">${gg[g].map(p=>{
    const cur=p.id===person.id;
    const dc=p.gender==="Male"?"var(--ml)":p.gender==="Female"?"var(--fm)":"var(--acm)";
    const isSp=(person.spouseIds||[]).includes(p.id);
    return`<div class="mnd ${cur?"cur":""}" onclick="vP('${p.id}')"><div class="mdt" style="background:${dc}"></div>${esc(p.firstName)} ${esc(p.lastName)}${isSp?" ∞":""}</div>`
  }).join("")}</div></div>`;
});
h+=`</div>`;return h}
